    git:
      user:
        name:
          secret: development-workspace-bootstrap
          namespace: development
          key: git_name
        email:
          secret: development-workspace-bootstrap
          namespace: development
          key: git_email
      repositories:
        - name: elite-flux-cluster
          url: https://github.com/fossum/elite-flux-cluster.git
          ref: main
          depth: 1
        - name: truecharts-public
          url: https://github.com/fossum/truecharts-public.git
          ref: copilot/create-helm-chart-copilot-cli
          depth: 1
    apt:
      proxy: ""
    packages:
      additional: []
    shell:
      ohMyZsh:
        enabled: true
        theme: dpoggi
        plugins:
          - git
          - kubectl
        extraConfig: ""
    python:
      pyenv:
        enabled: true
        versions: ["3.10", "3.14"]
        globalVersion: "3.14"
    persistence:
      repositories:
        size: 20Gi
      tailscale:
        enabled: true
        size: 1Gi
    tailscale:
      ssh:
        enabled: true
      image:
        tag: stable
    updates:
      upgradeOnStart: true
      restartJob:
        enabled: true
        schedule: "0 4 * * 0"
