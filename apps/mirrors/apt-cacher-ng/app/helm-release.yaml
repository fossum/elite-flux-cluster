apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apt-cacher-ng
  namespace: mirrors
spec:
  interval: 15m
  chart:
    spec:
      chart: apt-cacher-ng
      version: 10.5.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 25m
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: apt-cacher-ng
            patch: |
              - op: replace
                path: /spec/template/spec/securityContext
                value: {}
  valuesFrom:
    - kind: ConfigMap
      name: mirrors-config
      valuesKey: BASE_DOMAIN
      targetPath: baseDomain
  values:
    fallbackDefaults:
      storageClass: "truenas-nfs-api-csi"
      pvcSize: 100Gi

    TZ: "America/Los_Angeles"

    workload:
      main:
        podSpec:
          containers:
            main:
              command:
                - /bin/sh
                - -lc
              args:
                - exec su -s /bin/sh -c 'apt-cacher-ng -c /etc/apt-cacher-ng ForeGround=1' apt-cacher-ng

    probes:
      startup:
        spec:
          failureThreshold: 600

    service:
      main:
        type: LoadBalancer

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: "{{ .Release.Name }}.elite.internal"
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: selfsigned
