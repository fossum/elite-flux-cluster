---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drizzle-studio
  namespace: finance
spec:
  chart:
    spec:
      chart: ./charts/generic-npm
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: cluster
        namespace: flux-system
  interval: 15m0s
  timeout: 15m0s
  valuesFrom:
    - kind: Secret
      name: momentum-day-trader-cnpg-app
      valuesKey: uri
      targetPath: workload.main.podSpec.containers.main.env.DATABASE_URL
  values:
    secret:
      service-account:
        enabled: false
    image:
      repository: fossum/generic-npm
      tag: latest
      pullPolicy: Always
    workload:
      main:
        podSpec:
          annotations:
            fluxcd.io/git-repo: "flux-system/momentum-day-trader"
          dnsConfig:
            options:
              - name: ndots
                value: "5"
          containers:
            main:
              args: ["npx", "drizzle-kit", "studio", "--host", "0.0.0.0", "--port", "4983"]
              env:
                PORT: "4983"
              probes:
                liveness:
                  enabled: false
                readiness:
                  enabled: false
                startup:
                  enabled: false
    service:
      main:
        ports:
          main:
            port: 4983
            targetPort: 4983
    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: trader-db.elite.internal
            paths:
              - path: /
                pathType: ImplementationSpecific
        integrations:
          certManager:
            enabled: true
            certificateIssuer: selfsigned
    persistence:
      app-data:
        enabled: true
        type: pvc
        existingClaim: momentum-day-trader-pvc
        mountPath: "/app"
