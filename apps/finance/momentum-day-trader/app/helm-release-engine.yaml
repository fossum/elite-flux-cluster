---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: momentum-engine
  namespace: finance
spec:
  chart:
    spec:
      chart: ./charts/generic-npm
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: cluster
        namespace: flux-system
  interval: 1m0s
  timeout: 15m0s
  valuesFrom:
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: GEMINI_API_KEY
      targetPath: workload.main.podSpec.containers.main.env.GEMINI_API_KEY
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: FMP_API_KEY
      targetPath: workload.main.podSpec.containers.main.env.FMP_API_KEY
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: APP_URL
      targetPath: workload.main.podSpec.containers.main.env.APP_URL
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: FIREBASE_DATABASE_ID
      targetPath: workload.main.podSpec.containers.main.env.FIREBASE_DATABASE_ID
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: VITE_FIREBASE_DATABASE_ID
      targetPath: workload.main.podSpec.containers.main.env.VITE_FIREBASE_DATABASE_ID
    - kind: Secret
      name: momentum-day-trader-secrets
      valuesKey: ENCRYPTION_KEY
      targetPath: workload.main.podSpec.containers.main.env.ENCRYPTION_KEY
  values:
    secret:
      service-account:
        enabled: false
    image:
      repository: fossum/generic-npm
      tag: latest
      pullPolicy: Always
    workload:
      main:
        podSpec:
          containers:
            main:
              args: ["npm", "run", "start:engine"]
              env:
                PORT: "3000"
                BUILD_APP: "true"
                BUILD_SCRIPT: "build:engine"
                FIREBASE_SERVICE_ACCOUNT_PATH: "/app/secrets/service-account.json"
    ingress:
      main:
        enabled: false
    persistence:
      app-data:
        enabled: true
        type: pvc
        existingClaim: momentum-day-trader-pvc
        mountPath: "/app"
      account:
        enabled: true
        type: secret
        objectName: momentum-day-trader-secrets
        targetSelector:
          main:
            main:
              mountPath: "/app/secrets/service-account.json"
              subPath: "service-account.json"
              readOnly: true
