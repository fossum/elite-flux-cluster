---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: momentum-day-trader-pv
  labels:
    app: momentum-day-trader
spec:
  storageClassName: momentum-day-trader-pv
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.10
    path: /mnt/local-raid/home/ericfoss/development/momentum-day-trader
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: momentum-day-trader-pvc
  namespace: finance
spec:
  storageClassName: momentum-day-trader-pv
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: momentum-day-trader
