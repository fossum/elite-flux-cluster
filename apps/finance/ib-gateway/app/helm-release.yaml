apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ib-gateway
  namespace: finance
spec:
  chart:
    spec:
      chart: ./charts/ib-gateway
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: cluster
        namespace: flux-system
  interval: 1m0s
  timeout: 15m0s
  values:
    ibgateway:
      tradingMode: paper
      existingSecret: ib-gateway-credentials
    service:
      type: LoadBalancer
