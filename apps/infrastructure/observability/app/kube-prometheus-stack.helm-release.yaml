apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: enabled
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.1.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 60m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true

    cleanPrometheusOperatorObjectNames: true

    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false

    defaultRules:
      disabled:
        KubeControllerManagerDown: true
        KubeSchedulerDown: true

    grafana:
      enabled: false

    kube-state-metrics:
      rbac:
        extraRules:
          - apiGroups:
              - source.toolkit.fluxcd.io
              - kustomize.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
            resources:
              - gitrepositories
              - buckets
              - helmrepositories
              - helmcharts
              - ocirepositories
              - kustomizations
              - helmreleases
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux Kustomization resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
                      source_name: [spec, sourceRef, name]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux HelmRelease resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, history, "0", chartVersion]
                      chart_name: [status, history, "0", chartName]
                      chart_app_version: [status, history, "0", appVersion]
                      chart_ref_name: [spec, chartRef, name]
                      chart_source_name: [spec, chart, spec, sourceRef, name]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux GitRepository resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: Bucket
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux Bucket resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      endpoint: [spec, endpoint]
                      bucket_name: [spec, bucketName]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux HelmRepository resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmChart
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux HelmChart resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      chart_name: [spec, chart]
                      chart_version: [spec, version]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: OCIRepository
                metricNamePrefix: gotk
                metrics:
                  - name: resource_info
                    help: The current state of a Flux OCIRepository resource.
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]

    additionalPrometheusRulesMap:
      flux-health:
        groups:
          - name: flux.health
            rules:
              - alert: FluxResourceNotReady
                expr: gotk_resource_info{customresource_kind=~"Kustomization|HelmRelease|GitRepository|Bucket|HelmRepository|HelmChart|OCIRepository", ready!="True", suspended!="true"} == 1
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: Flux resource is not ready.
                  description: '{{ $labels.customresource_kind }} {{ $labels.exported_namespace }}/{{ $labels.name }} has reported Ready={{ $labels.ready }} for at least 10 minutes.'
      cert-manager:
        groups:
          - name: cert-manager.health
            rules:
              - alert: CertManagerCertificateNotReady
                expr: max by (namespace, name) (certmanager_certificate_ready_status{condition="False"} == 1)
                for: 15m
                labels:
                  severity: warning
                annotations:
                  summary: Certificate is not ready.
                  description: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} has been in a non-ready state for at least 15 minutes.'
              - alert: CertManagerCertificateExpiringSoon
                expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 604800
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: Certificate expires soon.
                  description: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} will expire within 7 days.'
      cnpg-health:
        groups:
          - name: cnpg.health
            rules:
              - alert: CloudNativePGReplicationLagHigh
                expr: max by (namespace, job) (cnpg_pg_replication_lag) > 16777216
                for: 15m
                labels:
                  severity: warning
                annotations:
                  summary: CNPG replication lag is high.
                  description: 'CNPG metrics target {{ $labels.job }} in namespace {{ $labels.namespace }} has replication lag above 16 MiB for at least 15 minutes.'

    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        useExistingSecret: true
        configSecret: alertmanager-config
        retention: 120h
        resources:
          requests:
            cpu: 50m # Alert routing is lightweight; keep the guaranteed footprint low.
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi # Alert history is small, so a compact PVC is enough.

    prometheus:
      additionalServiceMonitors:
        - name: generic-ingress-controller
          additionalLabels:
            app.kubernetes.io/component: observability-template
          namespaceSelector:
            matchNames:
              - nginx-ingress
          selector:
            matchLabels:
              app.kubernetes.io/name: nginx-ingress
              app.kubernetes.io/component: controller
          endpoints:
            - port: metrics
              interval: 30s
              scrapeTimeout: 10s
              path: /metrics
      prometheusSpec:
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: false
        walCompression: true
        retention: 7d
        retentionSize: 15GiB
        resources:
          requests:
            cpu: 300m # Reserve enough CPU for rule evaluation without starving small k3s nodes.
            memory: 1Gi # Prevent compaction spikes from evicting Prometheus on a constrained cluster.
          limits:
            cpu: 750m
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi # Seven days of home-lab metrics usually fits well in a modest PVC.
