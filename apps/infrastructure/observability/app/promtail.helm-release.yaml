apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: observability
spec:
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
    - name: loki
      namespace: observability
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: promtail
      version: 6.17.1
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 60m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    daemonset:
      enabled: true
    config:
      clients:
        - url: http://loki:3100/loki/api/v1/push
    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack
    resources:
      requests:
        cpu: 50m # Promtail mostly tails files; a tiny reserved footprint is enough per node.
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
