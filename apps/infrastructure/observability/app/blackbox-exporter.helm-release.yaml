apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: observability
spec:
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 11.10.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 60m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    releaseLabel: true
    config:
      modules:
        http_2xx:
          prober: http
          timeout: 5s
          http:
            method: GET
            follow_redirects: true
            preferred_ip_protocol: ip4
    resources:
      requests:
        cpu: 25m # HTTP probing is bursty; keep the reservation minimal on edge hardware.
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    serviceMonitor:
      selfMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
    extraManifests:
      - apiVersion: monitoring.coreos.com/v1
        kind: Probe
        metadata:
          name: external-https-example
          namespace: observability
          labels:
            release: kube-prometheus-stack
        spec:
          jobName: external-https-example
          interval: 60s
          module: http_2xx
          prober:
            url: blackbox-exporter.observability.svc.cluster.local:9115
          targets:
            staticConfig:
              static:
                - https://example.com
