apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: infrastructure
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: enabled
    
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=58.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 5m

  values:
    global:
      fallbackDefaults:
        storageClass: "longhorn"
        pvcSize: 10Gi
    
    grafana:
      enabled: false
      forceDeployDashboards: true
      defaultDashboardsEnabled: true
      forceDeployDatasources: true
    
    crds:
      enabled: true
      upgradeJob:
        enabled: true
        forceConflicts: true
    
    cleanPrometheusOperatorObjectNames: true

    alertmanager:
      enabled: true
      config:
        global:
          smtp_smarthost: '${SMTP_HOST}:587'
          smtp_from: ${SMTP_USER}
          smtp_auth_username: ${SMTP_USER}
          smtp_auth_password: ${SMTP_PASSWORD}
        route:
          group_by: ['namespace', 'alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'discord-and-email'
          routes:
            - matchers:
                - severity="none"
              receiver: 'null'
        receivers:
          - name: 'null'
          - name: 'discord-and-email'
            discord_configs:
              - webhook_url: ${DISCORD_FOSSTOPOLIS_WEBHOOK}
                title: '{{ template "discord.default.title" . }}'
                message: '{{ template "discord.default.message" . }}'
            email_configs:
              - to: ${SMTP_USER}
                send_resolved: true

    kubeProxy:
      enabled: false

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver # etcd runs on control plane nodes

    defaultRules:
      disabled:
        KubeControllerManagerDown: true
        KubeSchedulerDown: true
        KubeVersionMismatch: true

    additionalPrometheusRulesMap:
      k3s-control-plane:
        groups:
          - name: k3s.control-plane
            rules:
              - alert: K3sControlPlaneVersionMismatch
                expr: count(count by (git_version) (kubernetes_build_info{job="apiserver"})) > 1
                for: 15m
                labels:
                  severity: warning
                annotations:
                  summary: Different Kubernetes versions detected across the K3s control plane.
                  description: K3s runs the controller-manager and scheduler inside the server process, so version skew is most meaningful on the apiserver targets instead of across all kubelet metrics.

    prometheus:
      prometheusSpec:
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        retention: 14d
        retentionSize: 50GB
        resources:
          requests:
            cpu: 100m
            memory: 500Mi
          limits:
            memory: 2000Mi
