apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: web-services
  labels:
    grafana_datasource: "1"
data:
  observability-datasources.yaml: |
    apiVersion: 1
    prune: true
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Alertmanager
        orgId: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability:9090/
        isDefault: true
        editable: false
        version: 2
        jsonData:
          httpMethod: POST
          timeInterval: 30s
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://kube-prometheus-stack-alertmanager.observability:9093/
        editable: false
        version: 2
        jsonData:
          handleGrafanaManagedAlerts: false
          implementation: prometheus
