apiVersion: v1
kind: Service
metadata:
  name: {{ include "ib-gateway.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "ib-gateway.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      protocol: TCP
      targetPort: {{ .Values.service.apiPort }}
    - name: vnc
      port: {{ .Values.service.vncPort }}
      protocol: TCP
      targetPort: {{ .Values.service.vncPort }}
