# ib-client-portal Helm Chart Values (TrueCharts common library)

workload:
  main:
    replicas: 1
    strategy: Recreate
    podSpec:
      containers:
        main:
          enabled: true
          primary: true
          imageSelector: image
          env:
            IBEAM_OAUTH_TIMEOUT: "120"
            IBEAM_PAGE_LOAD_TIMEOUT: "30"
            IBEAM_GATEWAY_BASE_URL: '{{ if .Values.ingress.main.enabled }}https://{{ (index .Values.ingress.main.hosts 0).host }}{{ else }}https://localhost:5000{{ end }}'
            IBEAM_INPUTS_DIR: "/srv/inputs"
            IBEAM_OUTPUTS_DIR: "/srv/outputs"
          envValueFrom: {}
            # Flux will map the secrets dynamically into this dict via helm-release.yaml

image:
  repository: voyz/ibeam
  tag: latest
  pullPolicy: IfNotPresent

service:
  main:
    enabled: true
    primary: true
    type: ClusterIP
    ports:
      main:
        enabled: true
        primary: true
        port: 5000
        protocol: http
        targetPort: 5000

ingress:
  main:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: ImplementationSpecific
    integrations:
      certManager:
        enabled: true
        certificateIssuer: ""
      traefik:
        enabled: false
      homepage:
        enabled: false

persistence:
  outputs:
    enabled: true
    type: emptyDir
    mountPath: '{{ .Values.workload.main.podSpec.containers.main.env.IBEAM_OUTPUTS_DIR }}'
  inputs:
    enabled: true
    type: emptyDir
    mountPath: '{{ .Values.workload.main.podSpec.containers.main.env.IBEAM_INPUTS_DIR }}'
