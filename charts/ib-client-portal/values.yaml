# ib-client-portal Helm Chart Values (TrueCharts common library)

workload:
  main:
    replicas: 1
    strategy: Recreate
    podSpec:
      containers:
        main:
          enabled: true
          primary: true
          imageSelector: image
          env:
            IBEAM_OAUTH_TIMEOUT: "120"
            IBEAM_PAGE_LOAD_TIMEOUT: "30"
            IBEAM_GATEWAY_BASE_URL: '{{ if .Values.ingress.main.enabled }}https://{{ (index .Values.ingress.main.hosts 0).host }}{{ else }}https://localhost:5000{{ end }}'
            IBEAM_INPUTS_DIR: "/srv/inputs"    # Must match the persistence mountPath.
            IBEAM_OUTPUTS_DIR: "/srv/outputs"  # Must match the persistence mountPath.
            HOME: "/tmp"
            JAVA_TOOL_OPTIONS: "-Dvertx.cacheDirBase=/tmp/vertx-cache -Dvertx.cacheDir=/tmp/vertx-cache -Dvertx.disableFileCaching=true -Dvertx.disableFileCPResolving=true"
          envValueFrom: {}
            # Flux will map the secrets dynamically into this dict via helm-release.yaml

image:
  repository: voyz/ibeam
  tag: latest
  pullPolicy: IfNotPresent

service:
  main:
    enabled: true
    primary: true
    type: ClusterIP
    ports:
      main:
        enabled: true
        primary: true
        port: 5000
        protocol: http
        targetPort: 5000

ingress:
  main:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: ImplementationSpecific
    integrations:
      certManager:
        enabled: true
        certificateIssuer: ""
      traefik:
        enabled: false
      homepage:
        enabled: false

persistence:
  outputs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/outputs"
  inputs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/inputs"
  gw-logs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/clientportal.gw/logs"
