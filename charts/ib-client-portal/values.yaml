# ib-client-portal Helm Chart Values (TrueCharts common library)

workload:
  main:
    replicas: 1
    strategy: Recreate
    podSpec:
      containers:
        main:
          enabled: true
          primary: true
          imageSelector: image
          env:
            IBEAM_OAUTH_TIMEOUT: "120"
            IBEAM_PAGE_LOAD_TIMEOUT: "30"
            IBEAM_GATEWAY_BASE_URL: "http://localhost:5000"  # Do not modify!
            IBEAM_INPUTS_DIR: "/srv/inputs"    # Must match the persistence mountPath.
            IBEAM_OUTPUTS_DIR: "/srv/outputs"  # Must match the persistence mountPath.
            HOME: "/tmp"
            JAVA_TOOL_OPTIONS: "-Dvertx.cacheDirBase=/tmp/vertx-cache -Dvertx.cacheDir=/tmp/vertx-cache -Dvertx.disableFileCaching=true -Dvertx.disableFileCPResolving=true"
            IBEAM_TWO_FA_EL_ID: "ID@@xyz-field-silver-response"
            IBEAM_TWO_FA_INPUT_EL_ID: "ID@@xyz-field-silver-response"
          envValueFrom: {}
            # Flux will map the secrets dynamically into this dict via helm-release.yaml

image:
  repository: voyz/ibeam
  tag: latest
  pullPolicy: IfNotPresent

service:
  main:
    enabled: true
    primary: true
    type: ClusterIP
    ports:
      main:
        enabled: true
        primary: true
        port: 5000
        protocol: http
        targetPort: 5000

ingress:
  main:
    enabled: false
    ingressClassName: ""
    annotations:
      # nginx.org/basic-auth-secret: ib-client-portal-auth
      # nginx.org/basic-auth-realm: "Authentication Required"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: ImplementationSpecific
    integrations:
      certManager:
        enabled: true
        certificateIssuer: ""
      traefik:
        enabled: false
      homepage:
        enabled: false

persistence:
  outputs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/outputs"
  inputs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/inputs"
  gw-logs:
    enabled: true
    type: emptyDir
    mountPath: "/srv/clientportal.gw/logs"
  gateway-config:
    enabled: true
    type: configmap
    objectName: "gateway-config"
    mountPath: "/srv/clientportal.gw/root/conf.yaml"
    subPath: "conf.yaml"
    readOnly: true

configmap:
  gateway-config:
    enabled: true
    data:
      conf.yaml: |
        !!ibgroup.web.core.clientportal.gw.Config
        authDelay: 3000
        ccp: false
        cors: {origin.allowed: '*', allowCredentials: false}
        ip2loc: US
        ips:
          allow: [10.*, 192.*, 131.216.*, 172.17.0.*, 127.0.0.1, x.x.x.x]
          deny: [212.90.324.10, 0.0.0.0/0]
        listenPort: 5000
        listenSsl: false
        portalBaseURL: ''
        proxyRemoteHost: https://api.ibkr.com
        proxyRemoteSsl: true
        ssoPing: 5
        svcEnvironment: v1
        tst: false
        twsBaseURL: /tws.proxy
        webApps: []
