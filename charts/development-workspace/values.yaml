deployment:
  replicas: 1

image:
  repository: mcr.microsoft.com/devcontainers/base
  tag: ubuntu-24.04
  pullPolicy: IfNotPresent

user:
  name: vscode
  uid: 1000
  gid: 1000

timezone: UTC

git:
  user:
    name: ""
    email: ""
  repositories:
    - name: elite-flux-cluster
      url: https://github.com/fossum/elite-flux-cluster.git
      ref: main
      depth: 1

workspace:
  root: /workspace/repos
  home: /workspace/home/vscode
  startupScript: |
    trap : TERM INT
    sleep infinity & wait
  files: []

ssh:
  secretName: development-workspace-bootstrap
  mountPath: /bootstrap-secrets/ssh

apt:
  proxy: ""

packages:
  additional: []

shell:
  ohMyZsh:
    enabled: false
    theme: robbyrussell
    plugins:
      - git
    extraConfig: ""

python:
  pyenv:
    enabled: false
    versions: []
    globalVersion: ""

persistence:
  repositories:
    size: 20Gi
    storageClassName: ""
    existingClaim: ""
  tailscale:
    enabled: false
    size: 1Gi
    storageClassName: ""
    existingClaim: ""

tailscale:
  image:
    repository: ghcr.io/tailscale/tailscale
    tag: v1.86.2
    pullPolicy: IfNotPresent
  authKeySecretName: development-workspace-secrets
  authKeySecretKey: TAILSCALE_AUTH_KEY
  hostname: development-workspace

updates:
  upgradeOnStart: true
  restartJob:
    enabled: true
    schedule: "0 4 * * 0"
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 1
    image:
      repository: docker.io/bitnami/kubectl
      tag: 1.32.4
      pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 1000m
    memory: 2048Mi
  requests:
    cpu: 100m
    memory: 256Mi
