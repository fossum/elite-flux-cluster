{{- if .Values.updates.restartJob.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "development-workspace.fullname" . }}-restarter
subjects:
  - kind: ServiceAccount
    name: {{ include "development-workspace.fullname" . }}-restarter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "development-workspace.fullname" . }}-restarter
{{- end }}
