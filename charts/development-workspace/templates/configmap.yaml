{{- $userName := .Values.user.name -}}
{{- $workspaceHome := .Values.workspace.home | default (kindIs "string" $userName | ternary (printf "/workspace/home/%s" $userName) "") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "development-workspace.fullname" . }}-scripts
data:
  prepare-workspace.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    WORKSPACE_ROOT={{ .Values.workspace.root | quote }}

    case "$WORKSPACE_ROOT" in
      /workspace/*)
        ;;
      *)
        echo "workspace.root must be under /workspace/: $WORKSPACE_ROOT" >&2
        exit 1
        ;;
    esac

    WORKSPACE_USER="${WORKSPACE_USER:-vscode}"
    {{- if $workspaceHome }}
    WORKSPACE_HOME={{ $workspaceHome | quote }}
    {{- else }}
    WORKSPACE_HOME="/workspace/home/${WORKSPACE_USER}"
    {{- end }}
    if [ "$WORKSPACE_HOME" != "/workspace/home/vscode" ] && [ -d "/workspace/home/vscode" ] && [ ! -d "$WORKSPACE_HOME" ]; then
      mv "/workspace/home/vscode" "$WORKSPACE_HOME"
    fi
    mkdir -p "$WORKSPACE_ROOT" "$WORKSPACE_HOME"

    {{- range .Values.git.repositories }}
    repo_path="$WORKSPACE_ROOT/{{ .name }}"
    if [ -d "$repo_path/.git" ]; then
      git -C "$repo_path" rev-parse --is-inside-work-tree >/dev/null
    elif [ -e "$repo_path" ] && [ -n "$(ls -A "$repo_path" 2>/dev/null)" ]; then
      echo "Repository path exists but is not a git repo: $repo_path" >&2
      exit 1
    else
      rm -rf "$repo_path"
      git clone --branch "{{ .ref }}" --depth {{ .depth }} "{{ .url }}" "$repo_path"
    fi
    {{- end }}

  start-workspace.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    WORKSPACE_ROOT={{ .Values.workspace.root | quote }}
    WORKSPACE_USER="${WORKSPACE_USER:-vscode}"
    {{- if $workspaceHome }}
    WORKSPACE_HOME={{ $workspaceHome | quote }}
    {{- else }}
    WORKSPACE_HOME="/workspace/home/${WORKSPACE_USER}"
    {{- end }}
    TIMEZONE={{ .Values.timezone | quote }}
    SSH_SOURCE={{ .Values.ssh.mountPath | quote }}
    if [ "$WORKSPACE_HOME" != "/workspace/home/vscode" ] && [ -d "/workspace/home/vscode" ] && [ ! -d "$WORKSPACE_HOME" ]; then
      mv "/workspace/home/vscode" "$WORKSPACE_HOME"
    fi
    mkdir -p "$WORKSPACE_ROOT" "$WORKSPACE_HOME" "$WORKSPACE_HOME/.config" "$WORKSPACE_HOME/.cache" /tmp
    export HOME="$WORKSPACE_HOME"
    export TZ="$TIMEZONE"

    if command -v sudo >/dev/null 2>&1; then
      SUDO=(sudo)
    else
      SUDO=()
    fi

    if [ "$WORKSPACE_USER" != "vscode" ]; then
      if getent passwd "vscode" >/dev/null && ! getent passwd "$WORKSPACE_USER" >/dev/null; then
        if [ ${#SUDO[@]} -gt 0 ]; then
          "${SUDO[@]}" bash -c '
            WORKSPACE_USER="$1"
            WORKSPACE_HOME="$2"
            safe_sed() {
              local file="$1"
              local expr="$2"
              if [ -f "$file" ]; then
                local perms owner
                perms=$(stat -c "%a" "$file" 2>/dev/null || echo "640")
                owner=$(stat -c "%u:%g" "$file" 2>/dev/null || echo "0:0")
                sed -i "$expr" "$file"
                chown "$owner" "$file"
                chmod "$perms" "$file"
              fi
            }
            safe_sed /etc/passwd "s|^vscode:x:1000:1000::/home/vscode:|${WORKSPACE_USER}:x:1000:1000::${WORKSPACE_HOME}:|"
            safe_sed /etc/group "s/^vscode:x:1000:/${WORKSPACE_USER}:x:1000:/"
            safe_sed /etc/shadow "s/^vscode:/${WORKSPACE_USER}:/"
            safe_sed /etc/gshadow "s/^vscode:/${WORKSPACE_USER}:/"
            safe_sed /etc/subuid "s/^vscode:/${WORKSPACE_USER}:/"
            safe_sed /etc/subgid "s/^vscode:/${WORKSPACE_USER}:/"
            if [ -f /etc/sudoers.d/vscode ]; then
              safe_sed /etc/sudoers.d/vscode "s/vscode/${WORKSPACE_USER}/g"
              mv /etc/sudoers.d/vscode "/etc/sudoers.d/${WORKSPACE_USER}"
            fi
          ' -- "$WORKSPACE_USER" "$WORKSPACE_HOME"
        else
          safe_sed() {
            local file="$1"
            local expr="$2"
            if [ -f "$file" ]; then
              local perms owner
              perms=$(stat -c "%a" "$file" 2>/dev/null || echo "640")
              owner=$(stat -c "%u:%g" "$file" 2>/dev/null || echo "0:0")
              sed -i "$expr" "$file"
              chown "$owner" "$file"
              chmod "$perms" "$file"
            fi
          }
          safe_sed /etc/passwd "s|^vscode:x:1000:1000::/home/vscode:|${WORKSPACE_USER}:x:1000:1000::${WORKSPACE_HOME}:|"
          safe_sed /etc/group "s/^vscode:x:1000:/${WORKSPACE_USER}:x:1000:/"
          safe_sed /etc/shadow "s/^vscode:/${WORKSPACE_USER}:/"
          safe_sed /etc/gshadow "s/^vscode:/${WORKSPACE_USER}:/"
          safe_sed /etc/subuid "s/^vscode:/${WORKSPACE_USER}:/"
          safe_sed /etc/subgid "s/^vscode:/${WORKSPACE_USER}:/"
        fi
      fi
    fi

    if [ -n {{ .Values.apt.proxy | quote }} ]; then
      cat <<'EOF_PROXY' | "${SUDO[@]}" tee /etc/apt/apt.conf.d/99development-workspace-proxy >/dev/null
    Acquire::http::Proxy "{{ .Values.apt.proxy }}";
    Acquire::https::Proxy "{{ .Values.apt.proxy }}";
    EOF_PROXY
    else
      "${SUDO[@]}" rm -f /etc/apt/apt.conf.d/99development-workspace-proxy
    fi

    packages=(ca-certificates curl git openssh-client tzdata)
    {{- if .Values.workspace.sshd.enabled }}
    packages+=(openssh-server)
    {{- end }}
    {{- if .Values.shell.ohMyZsh.enabled }}
    packages+=(zsh)
    {{- end }}
    {{- if .Values.python.pyenv.enabled }}
    packages+=(build-essential libbz2-dev libffi-dev liblzma-dev libncursesw5-dev libreadline-dev libsqlite3-dev libssl-dev libxml2-dev libxmlsec1-dev tk-dev xz-utils zlib1g-dev)
    {{- end }}
    {{- range .Values.packages.additional }}
    packages+=({{ . | quote }})
    {{- end }}

    "${SUDO[@]}" apt-get update
    DEBIAN_FRONTEND=noninteractive "${SUDO[@]}" apt-get install -y --no-install-recommends "${packages[@]}"
    {{- if .Values.updates.upgradeOnStart }}
    DEBIAN_FRONTEND=noninteractive "${SUDO[@]}" apt-get upgrade -y
    {{- end }}
    "${SUDO[@]}" apt-get clean

    if [ -n "$TIMEZONE" ] && [ -e "/usr/share/zoneinfo/$TIMEZONE" ]; then
      echo "$TIMEZONE" | "${SUDO[@]}" tee /etc/timezone >/dev/null
      "${SUDO[@]}" ln -snf "/usr/share/zoneinfo/$TIMEZONE" /etc/localtime
    fi

    install -d -m 700 "$HOME/.ssh"
    if [ -d "$SSH_SOURCE" ]; then
      shopt -s nullglob
      for source_file in "$SSH_SOURCE"/*; do
        [ -f "$source_file" ] || continue
        [ -s "$source_file" ] || continue
        case "$(basename "$source_file")" in
          git_name|git_email)
            continue
            ;;
        esac
        target_file="$HOME/.ssh/$(basename "$source_file")"
        cp "$source_file" "$target_file"
        chmod 600 "$target_file"
        case "$(basename "$target_file")" in
          *.pub|known_hosts)
            chmod 644 "$target_file"
            ;;
        esac
      done
    fi

    {{- if .Values.workspace.sshd.enabled }}
    touch "$HOME/.ssh/authorized_keys"
    chmod 600 "$HOME/.ssh/authorized_keys"
    for public_key in "$HOME"/.ssh/*.pub; do
      [ -f "$public_key" ] || continue
      key_contents="$(tr -d '\r' < "$public_key")"
      [ -n "$key_contents" ] || continue
      if ! grep -Fqx "$key_contents" "$HOME/.ssh/authorized_keys"; then
        printf '%s\n' "$key_contents" >> "$HOME/.ssh/authorized_keys"
      fi
    done
    {{- range .Values.workspace.sshd.authorizedKeys }}
    if ! grep -Fqx {{ . | quote }} "$HOME/.ssh/authorized_keys"; then
      printf '%s\n' {{ . | quote }} >> "$HOME/.ssh/authorized_keys"
    fi
    {{- end }}

    if [ ${#SUDO[@]} -eq 0 ]; then
      echo "workspace.sshd.enabled requires sudo in the main container image" >&2
      exit 1
    fi

    passwd_home="$(getent passwd "$(id -un)" | cut -d: -f6 || true)"
    if [ -n "$passwd_home" ] && [ "$passwd_home" != "$HOME" ]; then
      install -d -m 700 "$passwd_home"
    fi

    sync_ssh_home() {
      target_home="$1"
      target_user="$2"
      [ -n "$target_home" ] || return 0
      target_group="$(id -gn "$target_user")"
      "${SUDO[@]}" install -d -o "$target_user" -g "$target_group" -m 700 "$target_home/.ssh"
      shopt -s dotglob nullglob
      for ssh_file in "$HOME/.ssh"/*; do
        [ -f "$ssh_file" ] || continue
        target_ssh_file="$target_home/.ssh/$(basename "$ssh_file")"
        "${SUDO[@]}" cp "$ssh_file" "$target_ssh_file"
        "${SUDO[@]}" chown "$target_user:$target_group" "$target_ssh_file"
        "${SUDO[@]}" chmod 600 "$target_ssh_file"
        case "$(basename "$target_ssh_file")" in
          *.pub|known_hosts)
            "${SUDO[@]}" chmod 644 "$target_ssh_file"
            ;;
        esac
      done
      shopt -u dotglob nullglob
      "${SUDO[@]}" chmod 700 "$target_home/.ssh"
    }

    if [ -n "$passwd_home" ] && [ "$passwd_home" != "$HOME" ]; then
      sync_ssh_home "$passwd_home" "$(id -un)"
    fi
    if [ "$WORKSPACE_USER" != "$(id -un)" ]; then
      additional_user_home="$(getent passwd "$WORKSPACE_USER" | cut -d: -f6 || true)"
      sync_ssh_home "$additional_user_home" "$WORKSPACE_USER"
    fi

    "${SUDO[@]}" install -d -m 755 /run/sshd /var/run/sshd
    cat <<EOF_SSHD_CONFIG | "${SUDO[@]}" tee /etc/ssh/sshd_config.d/development-workspace.conf >/dev/null
    Port {{ .Values.workspace.sshd.port }}
    PasswordAuthentication {{ ternary "yes" "no" .Values.workspace.sshd.passwordAuthentication }}
    KbdInteractiveAuthentication no
    ChallengeResponseAuthentication no
    PubkeyAuthentication yes
    PermitRootLogin {{ .Values.workspace.sshd.permitRootLogin }}
    AuthorizedKeysFile .ssh/authorized_keys
    AllowUsers $WORKSPACE_USER
    EOF_SSHD_CONFIG

    if [ ! -f /etc/ssh/ssh_host_rsa_key ]; then
      "${SUDO[@]}" ssh-keygen -A
    fi
    {{- end }}

    touch "$HOME/.gitconfig"
    if [ -n "${GIT_USER_NAME:-}" ]; then
      git config --global user.name "$GIT_USER_NAME"
    fi
    if [ -n "${GIT_USER_EMAIL:-}" ]; then
      git config --global user.email "$GIT_USER_EMAIL"
    fi
    git config --global init.defaultBranch main

    cat > "$HOME/.bashrc.workspace" <<'EOF_BASHRC'
    export HOME={{ $workspaceHome | default "/workspace/home/$USER" | quote }}
    export TZ={{ .Values.timezone | quote }}
    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if command -v pyenv >/dev/null 2>&1; then
      eval "$(pyenv init - bash)"
    fi
    {{- end }}
    EOF_BASHRC

    if [ ! -f "$HOME/.bashrc" ]; then
      cat > "$HOME/.bashrc" <<'EOF_BASHRC_MAIN'
    [ -f "$HOME/.bashrc.workspace" ] && . "$HOME/.bashrc.workspace"
    [ -f "$HOME/.bashrc.user" ] && . "$HOME/.bashrc.user"
    EOF_BASHRC_MAIN
    fi

    {{- if .Values.shell.ohMyZsh.enabled }}
    if [ ! -d "$HOME/.oh-my-zsh" ]; then
      git clone --depth 1 https://github.com/ohmyzsh/ohmyzsh.git "$HOME/.oh-my-zsh"
    fi
    if [ ! -f "$HOME/.zshrc" ]; then
      cat > "$HOME/.zshrc" <<'EOF_ZSHRC'
    export ZSH="$HOME/.oh-my-zsh"
    ZSH_THEME="{{ .Values.shell.ohMyZsh.theme }}"
    plugins=({{ join " " .Values.shell.ohMyZsh.plugins }})
    source "$ZSH/oh-my-zsh.sh"
    [ -f "$HOME/.zshrc.workspace" ] && source "$HOME/.zshrc.workspace"
    [ -f "$HOME/.zshrc.user" ] && source "$HOME/.zshrc.user"
    EOF_ZSHRC
    fi
    cat > "$HOME/.zshrc.workspace" <<'EOF_ZSHRC_WORKSPACE'
    export HOME={{ $workspaceHome | default "/workspace/home/$USER" | quote }}
    export TZ={{ .Values.timezone | quote }}
    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if command -v pyenv >/dev/null 2>&1; then
      eval "$(pyenv init - zsh)"
    fi
    {{- end }}
    {{ .Values.shell.ohMyZsh.extraConfig }}
    EOF_ZSHRC_WORKSPACE
    {{- end }}

    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if [ ! -d "$PYENV_ROOT" ]; then
      git clone --depth 1 https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
    fi
    eval "$("$PYENV_ROOT/bin/pyenv" init - bash)"
    {{- range .Values.python.pyenv.versions }}
    "$PYENV_ROOT/bin/pyenv" install -s {{ . | quote }}
    {{- end }}
    {{- if .Values.python.pyenv.globalVersion }}
    "$PYENV_ROOT/bin/pyenv" global {{ .Values.python.pyenv.globalVersion | quote }}
    {{- end }}
    {{- end }}

    {{- range $index, $file := .Values.workspace.files }}
    target_path={{ $file.path | quote }}
    case "$target_path" in
      /*)
        ;;
      *)
        target_path="$HOME/$target_path"
        ;;
    esac
    case "$target_path" in
      "$HOME"/*|/workspace/*)
        ;;
      *)
        echo "workspace.files[{{ $index }}].path must resolve under \$HOME or /workspace: $target_path" >&2
        exit 1
        ;;
    esac
    install -d -m 755 "$(dirname "$target_path")"
    {{- if hasKey $file "contentBase64" }}
    printf '%s' {{ replace "\n" "" (replace "\r" "" $file.contentBase64) | quote }} | base64 -d > "$target_path"
    {{- else }}
    cat > "$target_path" <<'EOF_WORKSPACE_FILE_{{ $index }}'
{{ $file.content | indent 4 }}
    EOF_WORKSPACE_FILE_{{ $index }}
    {{- end }}
    chmod {{ default "0644" $file.mode | quote }} "$target_path"
    {{- end }}

    {{- if .Values.ag2r.enabled }}
    if ! command -v node >/dev/null 2>&1; then
      curl -fsSL https://deb.nodesource.com/setup_22.x | "${SUDO[@]}" bash -
      "${SUDO[@]}" apt-get install -y --no-install-recommends nodejs
    fi

    AG2R_DIR="$HOME/.ag2r"
    if [ ! -d "$AG2R_DIR/.git" ]; then
      git clone --branch {{ .Values.ag2r.ref | quote }} --depth 1 {{ .Values.ag2r.repository | quote }} "$AG2R_DIR"
    else
      git -C "$AG2R_DIR" pull --ff-only || true
    fi
    cd "$AG2R_DIR"
    npm install --production 2>&1 | tail -1

    : > "$AG2R_DIR/.env"
    echo "PORT={{ .Values.ag2r.port }}" >> "$AG2R_DIR/.env"
    echo "CDP_HOST={{ .Values.ag2r.cdp.host }}" >> "$AG2R_DIR/.env"
    echo "CDP_PORT={{ .Values.ag2r.cdp.port }}" >> "$AG2R_DIR/.env"
    echo "AUTH_ENABLED={{ .Values.ag2r.auth.enabled }}" >> "$AG2R_DIR/.env"
    {{- if .Values.ag2r.auth.password }}
    echo "APP_PASSWORD={{ .Values.ag2r.auth.password }}" >> "$AG2R_DIR/.env"
    {{- end }}
    {{- if .Values.ag2r.auth.sessionSecret }}
    echo "SESSION_SECRET={{ .Values.ag2r.auth.sessionSecret }}" >> "$AG2R_DIR/.env"
    {{- end }}
    echo "POLL_INTERVAL_MS={{ .Values.ag2r.pollIntervalMs }}" >> "$AG2R_DIR/.env"
    echo "TUNNEL_ENABLED={{ .Values.ag2r.tunnel.enabled }}" >> "$AG2R_DIR/.env"
    {{- if .Values.ag2r.tunnel.url }}
    echo "TUNNEL_URL={{ .Values.ag2r.tunnel.url }}" >> "$AG2R_DIR/.env"
    {{- end }}
    echo "AG2R_TELEMETRY={{ .Values.ag2r.telemetry }}" >> "$AG2R_DIR/.env"
    {{- if .Values.ag2r.vapidEmail }}
    echo "VAPID_EMAIL={{ .Values.ag2r.vapidEmail }}" >> "$AG2R_DIR/.env"
    {{- end }}

    cd "$AG2R_DIR" && {{ if .Values.ag2r.debug }}AG2R_DEBUG=1 {{ end }}node server.js &
    cd "$WORKSPACE_ROOT"
    {{- end }}

    cat > /tmp/workspace-startup.sh <<'EOF_WORKSPACE_STARTUP'
{{ .Values.workspace.startupScript | indent 4 }}
    EOF_WORKSPACE_STARTUP
    chmod 0755 /tmp/workspace-startup.sh

    {{- if .Values.workspace.sshd.enabled }}
    "${SUDO[@]}" /usr/sbin/sshd -D -e &
    {{- end }}

    cd "$WORKSPACE_ROOT"
    exec /bin/bash /tmp/workspace-startup.sh
