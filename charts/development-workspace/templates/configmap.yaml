apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "development-workspace.fullname" . }}-scripts
data:
  prepare-workspace.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    WORKSPACE_ROOT={{ .Values.workspace.root | quote }}

    case "$WORKSPACE_ROOT" in
      /workspace/*)
        ;;
      *)
        echo "workspace.root must be under /workspace/: $WORKSPACE_ROOT" >&2
        exit 1
        ;;
    esac

    mkdir -p "$WORKSPACE_ROOT" {{ .Values.workspace.home | quote }}

    {{- range .Values.git.repositories }}
    repo_path="$WORKSPACE_ROOT/{{ .name }}"
    if [ -d "$repo_path/.git" ]; then
      git -C "$repo_path" rev-parse --is-inside-work-tree >/dev/null
    elif [ -e "$repo_path" ] && [ -n "$(ls -A "$repo_path" 2>/dev/null)" ]; then
      echo "Repository path exists but is not a git repo: $repo_path" >&2
      exit 1
    else
      rm -rf "$repo_path"
      git clone --branch "{{ .ref }}" --depth {{ .depth }} "{{ .url }}" "$repo_path"
    fi
    {{- end }}

  start-workspace.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    WORKSPACE_ROOT={{ .Values.workspace.root | quote }}
    WORKSPACE_HOME={{ .Values.workspace.home | quote }}
    TIMEZONE={{ .Values.timezone | quote }}
    SSH_SOURCE={{ .Values.ssh.mountPath | quote }}
    mkdir -p "$WORKSPACE_ROOT" "$WORKSPACE_HOME" "$WORKSPACE_HOME/.config" "$WORKSPACE_HOME/.cache" /tmp
    export HOME="$WORKSPACE_HOME"
    export TZ="$TIMEZONE"

    if command -v sudo >/dev/null 2>&1; then
      SUDO=(sudo)
    else
      SUDO=()
    fi

    if [ -n {{ .Values.apt.proxy | quote }} ]; then
      cat <<'EOF_PROXY' | "${SUDO[@]}" tee /etc/apt/apt.conf.d/99development-workspace-proxy >/dev/null
    Acquire::http::Proxy "{{ .Values.apt.proxy }}";
    Acquire::https::Proxy "{{ .Values.apt.proxy }}";
    EOF_PROXY
    else
      "${SUDO[@]}" rm -f /etc/apt/apt.conf.d/99development-workspace-proxy
    fi

    packages=(ca-certificates curl git openssh-client tzdata)
    {{- if .Values.shell.ohMyZsh.enabled }}
    packages+=(zsh)
    {{- end }}
    {{- if .Values.python.pyenv.enabled }}
    packages+=(build-essential libbz2-dev libffi-dev liblzma-dev libncursesw5-dev libreadline-dev libsqlite3-dev libssl-dev libxml2-dev libxmlsec1-dev tk-dev xz-utils zlib1g-dev)
    {{- end }}
    {{- range .Values.packages.additional }}
    packages+=({{ . | quote }})
    {{- end }}

    "${SUDO[@]}" apt-get update
    DEBIAN_FRONTEND=noninteractive "${SUDO[@]}" apt-get install -y --no-install-recommends "${packages[@]}"
    {{- if .Values.updates.upgradeOnStart }}
    DEBIAN_FRONTEND=noninteractive "${SUDO[@]}" apt-get upgrade -y
    {{- end }}
    "${SUDO[@]}" apt-get clean

    if [ -n "$TIMEZONE" ] && [ -e "/usr/share/zoneinfo/$TIMEZONE" ]; then
      echo "$TIMEZONE" | "${SUDO[@]}" tee /etc/timezone >/dev/null
      "${SUDO[@]}" ln -snf "/usr/share/zoneinfo/$TIMEZONE" /etc/localtime
    fi

    install -d -m 700 "$HOME/.ssh"
    if [ -d "$SSH_SOURCE" ]; then
      shopt -s nullglob
      for source_file in "$SSH_SOURCE"/*; do
        [ -f "$source_file" ] || continue
        [ -s "$source_file" ] || continue
        case "$(basename "$source_file")" in
          git_name|git_email)
            continue
            ;;
        esac
        target_file="$HOME/.ssh/$(basename "$source_file")"
        cp "$source_file" "$target_file"
        chmod 600 "$target_file"
        case "$(basename "$target_file")" in
          *.pub|known_hosts)
            chmod 644 "$target_file"
            ;;
        esac
      done
    fi

    touch "$HOME/.gitconfig"
    if [ -n "${GIT_USER_NAME:-}" ]; then
      git config --global user.name "$GIT_USER_NAME"
    fi
    if [ -n "${GIT_USER_EMAIL:-}" ]; then
      git config --global user.email "$GIT_USER_EMAIL"
    fi
    git config --global init.defaultBranch main

    cat > "$HOME/.bashrc.workspace" <<'EOF_BASHRC'
    export HOME={{ .Values.workspace.home | quote }}
    export TZ={{ .Values.timezone | quote }}
    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if command -v pyenv >/dev/null 2>&1; then
      eval "$(pyenv init - bash)"
    fi
    {{- end }}
    EOF_BASHRC

    if [ ! -f "$HOME/.bashrc" ]; then
      cat > "$HOME/.bashrc" <<'EOF_BASHRC_MAIN'
    [ -f "$HOME/.bashrc.workspace" ] && . "$HOME/.bashrc.workspace"
    [ -f "$HOME/.bashrc.user" ] && . "$HOME/.bashrc.user"
    EOF_BASHRC_MAIN
    fi

    {{- if .Values.shell.ohMyZsh.enabled }}
    if [ ! -d "$HOME/.oh-my-zsh" ]; then
      git clone --depth 1 https://github.com/ohmyzsh/ohmyzsh.git "$HOME/.oh-my-zsh"
    fi
    if [ ! -f "$HOME/.zshrc" ]; then
      cat > "$HOME/.zshrc" <<'EOF_ZSHRC'
    export ZSH="$HOME/.oh-my-zsh"
    ZSH_THEME="{{ .Values.shell.ohMyZsh.theme }}"
    plugins=({{ join " " .Values.shell.ohMyZsh.plugins }})
    source "$ZSH/oh-my-zsh.sh"
    [ -f "$HOME/.zshrc.workspace" ] && source "$HOME/.zshrc.workspace"
    [ -f "$HOME/.zshrc.user" ] && source "$HOME/.zshrc.user"
    EOF_ZSHRC
    fi
    cat > "$HOME/.zshrc.workspace" <<'EOF_ZSHRC_WORKSPACE'
    export HOME={{ .Values.workspace.home | quote }}
    export TZ={{ .Values.timezone | quote }}
    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if command -v pyenv >/dev/null 2>&1; then
      eval "$(pyenv init - zsh)"
    fi
    {{- end }}
    {{ .Values.shell.ohMyZsh.extraConfig }}
    EOF_ZSHRC_WORKSPACE
    {{- end }}

    {{- if .Values.python.pyenv.enabled }}
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    if [ ! -d "$PYENV_ROOT" ]; then
      git clone --depth 1 https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
    fi
    eval "$("$PYENV_ROOT/bin/pyenv" init - bash)"
    {{- range .Values.python.pyenv.versions }}
    "$PYENV_ROOT/bin/pyenv" install -s {{ . | quote }}
    {{- end }}
    {{- if .Values.python.pyenv.globalVersion }}
    "$PYENV_ROOT/bin/pyenv" global {{ .Values.python.pyenv.globalVersion | quote }}
    {{- end }}
    {{- end }}

    {{- range $index, $file := .Values.workspace.files }}
    target_path={{ $file.path | quote }}
    case "$target_path" in
      /*)
        ;;
      *)
        target_path="$HOME/$target_path"
        ;;
    esac
    case "$target_path" in
      "$HOME"/*|/workspace/*)
        ;;
      *)
        echo "workspace.files[{{ $index }}].path must resolve under \$HOME or /workspace: $target_path" >&2
        exit 1
        ;;
    esac
    install -d -m 755 "$(dirname "$target_path")"
    cat > "$target_path" <<'EOF_WORKSPACE_FILE_{{ $index }}'
{{ $file.content | indent 4 }}
    EOF_WORKSPACE_FILE_{{ $index }}
    chmod {{ default "0644" $file.mode | quote }} "$target_path"
    {{- end }}

    cd "$WORKSPACE_ROOT"
    exec /bin/bash -lc {{ .Values.workspace.startupScript | quote }}
