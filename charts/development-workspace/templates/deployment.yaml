apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "development-workspace.fullname" . }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "development-workspace.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "development-workspace.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsUser: {{ .Values.user.uid }}
        runAsGroup: {{ .Values.user.gid }}
        fsGroup: {{ .Values.user.gid }}
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: prepare-workspace
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/bash
            - /bootstrap-scripts/prepare-workspace.sh
          volumeMounts:
            - name: bootstrap-scripts
              mountPath: /bootstrap-scripts
            - name: repositories
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      containers:
        - name: main
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          stdin: true
          tty: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: {{ .Values.workspace.home }}
            - name: TZ
              value: {{ .Values.timezone | quote }}
          command:
            - /bin/bash
            - /bootstrap-scripts/start-workspace.sh
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          volumeMounts:
            - name: bootstrap-scripts
              mountPath: /bootstrap-scripts
            - name: ssh-bootstrap
              mountPath: {{ .Values.ssh.mountPath }}
              readOnly: true
            - name: repositories
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
        - name: tailscale
          image: {{ .Values.tailscale.image.repository }}:{{ .Values.tailscale.image.tag }}
          imagePullPolicy: {{ .Values.tailscale.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.authKeySecretName }}
                  key: {{ .Values.tailscale.authKeySecretKey }}
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--hostname={{ .Values.tailscale.hostname }}"
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_SOCKET
              value: /var/run/tailscale/tailscaled.sock
            - name: TS_STATE_DIR
              value: /var/lib/tailscale/state
            - name: TS_USERSPACE
              value: "true"
          command:
            - /usr/local/bin/containerboot
          volumeMounts:
            - name: tailscale-run
              mountPath: /var/run/tailscale
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap-scripts
          configMap:
            name: {{ include "development-workspace.fullname" . }}-scripts
            defaultMode: 0555
        - name: ssh-bootstrap
          secret:
            secretName: {{ .Values.ssh.secretName }}
            defaultMode: 0400
        - name: repositories
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.repositories.existingClaim | default (printf "%s-repositories" (include "development-workspace.fullname" .)) }}
        - name: tailscale-run
          emptyDir: {}
        - name: tailscale-state
          emptyDir: {}
        - name: tmp
          emptyDir: {}
